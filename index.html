 function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === 'optionalAccess' || op === 'optionalCall') && value == null) { return undefined; } if (op === 'access' || op === 'optionalAccess') { lastAccessLHS = value; value = fn(value); } else if (op === 'call' || op === 'optionalCall') { value = fn((...args) => value.call(lastAccessLHS, ...args)); lastAccessLHS = undefined; } } return value; }const { useState, useEffect, useRef } = React;

  const d=new Date(date);d.setHours(0,0,0,0);
  return Math.max(1,Math.min(16,Math.floor((d-SEM)/(7*864e5))+1));

const wkBounds=wk=>{
  const s=new Date(SEM);s.setDate(s.getDate()+(wk-1)*7);
  const e=new Date(s);e.setDate(e.getDate()+6);
  return {s,e,ss:dStr(s),es:dStr(e),l:`${s.getMonth()+1}/${s.getDate()}~${e.getMonth()+1}/${e.getDate()}`};
};

/* ═══ MAIN APP ══════════════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState('home');const [rdy,setRdy]=useState(false);
  const [subjects,setSubjects]=useState(I_SUBS);
  const [timetable,setTimetable]=useState(I_TT);
  const [events,setEvents]=useState(I_EV);
  const [materials,setMaterials]=useState([]);
  const [memos,setMemos]=useState([]);
  const [todos,setTodos]=useState([]);
  const [studyCheck,setStudyCheck]=useState({});
  const [wsData,setWsData]=useState(()=>JSON.parse(JSON.stringify(WS)));

  useEffect(()=>{
    const ss=DB.get('subjects'), tt=DB.get('timetable'), ev=DB.get('events');
    const mat=DB.get('materials'), mo=DB.get('memos'), td=DB.get('todos');
    const sc=DB.get('studyCheck'), ws=DB.get('wsData');
    if(ss){const m=[...ss];I_SUBS.forEach(is=>{if(!ss.find(s=>s.id===is.id))m.push(is);});setSubjects(m);}
    if(ev){const m=[...ev];I_EV.forEach(ie=>{if(!ev.find(e=>e.id===ie.id))m.push(ie);});setEvents(m);}
    if(tt)setTimetable(tt); if(mat)setMaterials(mat); if(mo)setMemos(mo);
    if(td)setTodos(td); if(sc)setStudyCheck(sc);
    if(ws){ setWsData({...WS,...ws}); }
    setRdy(true);
  },[]);

  useEffect(()=>{ if(rdy) DB.set('subjects',subjects); },[subjects,rdy]);
  useEffect(()=>{if(rdy)DB.set('timetable',timetable);},[timetable,rdy]);
  useEffect(()=>{if(rdy)DB.set('events',events);},[events,rdy]);
  useEffect(()=>{if(rdy)DB.set('materials',materials);},[materials,rdy]);
  useEffect(()=>{if(rdy)DB.set('memos',memos);},[memos,rdy]);
  useEffect(()=>{if(rdy)DB.set('todos',todos);},[todos,rdy]);
  useEffect(()=>{if(rdy)DB.set('studyCheck',studyCheck);},[studyCheck,rdy]);
  useEffect(()=>{if(rdy)DB.set('wsData',wsData);},[wsData,rdy]);

  // ── Auto weekly backup ──
  useEffect(()=>{
    if (!rdy) return;
    const last = localStorage.getItem('sp_lastBackup');
    const now  = Date.now();
    const WEEK = 7 * 24 * 60 * 60 * 1000;
    if (!last || now - parseInt(last) > WEEK) {
      // Show reminder after 2s so app loads first
      const t = setTimeout(() => {
        const ok = window.confirm(
          '📦 자동 백업 알림\n\n마지막 백업으로부터 7일이 지났어요.\n지금 JSON으로 내보낼까요?'
        );
        if (ok) doExport();
        localStorage.setItem('sp_lastBackup', String(Date.now()));
      }, 2000);
      return () => clearTimeout(t);
    }
  }, [rdy]);

  const doExport = () => {
    const data={subjects,timetable,events,materials,memos,todos,studyCheck,wsData,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`study-planner-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
    localStorage.setItem('sp_lastBackup', String(Date.now()));
  };

  // ── JSON Export/Import ──
  const exportJSON = () => {
    doExport();
  };
  const importJSON = (file) => {
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(d.subjects)setSubjects(d.subjects);
        if(d.timetable)setTimetable(d.timetable);
        if(d.events)setEvents(d.events);
        if(d.materials)setMaterials(d.materials);
        if(d.memos)setMemos(d.memos);
        if(d.todos)setTodos(d.todos);
        if(d.studyCheck)setStudyCheck(d.studyCheck);
        if(d.wsData)setWsData(d.wsData);
        alert('✅ 데이터를 불러왔어요!');
      }catch (e5){ alert('❌ 파일을 읽을 수 없어요. 올바른 JSON 파일인지 확인하세요.'); }
    };
    reader.readAsText(file);
  };
  const resetAll = () => {
    if(!window.confirm('⚠️ 모든 데이터를 초기화할까요? 이 작업은 되돌릴 수 없어요.'))return;
    DB.keys().forEach(k=>localStorage.removeItem('sp_'+k));
    window.location.reload();
  };

  const sh={subjects,setSubjects,timetable,setTimetable,events,setEvents,materials,setMaterials,memos,setMemos,todos,setTodos,studyCheck,setStudyCheck,wsData,setWsData,exportJSON,importJSON,resetAll};
  const td2=today();
  const badge=todos.filter(t=>t.date===td2&&!t.done).length+events.filter(e=>e.date===td2&&!e.done).length;
  const curWk=getWk(new Date());
  const studyBadge=Object.keys(sh.studyCheck||{}).filter(k=>k.includes(`_${curWk}_`)&&!sh.studyCheck[k]).length===0&&false; // future use

  if(!rdy)return(
    React.createElement('div', { style: {display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:BG},}
      , React.createElement('div', { style: {...neu(30,14),padding:'32px 48px',textAlign:'center'},}
        , React.createElement('div', { style: {fontSize:36,marginBottom:12},}, "📚")
        , React.createElement('div', { style: {color:ACC,fontWeight:700,fontSize:16},}, "불러오는 중..." )
      )
    )
  );

  const TABS=[
    {id:'home',      i:'🏠', l:'홈'},
    {id:'study',     i:'📖', l:'예습'},
    {id:'calendar',  i:'📅', l:'달력'},
    {id:'todo',      i:'✅', l:'할일'},
    {id:'timetable', i:'📋', l:'시간표'},
    {id:'subjects',  i:'📚', l:'과목'},
    {id:'settings',  i:'⚙️', l:'설정'},
  ];

  return(
    React.createElement('div', { style: {fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui",background:BG,minHeight:'100vh',color:TXT,paddingBottom:80,maxWidth:480,margin:'0 auto'},}
      , tab==='home'     &&React.createElement(HomeTab, {     ...sh,})
      , tab==='study'    &&React.createElement(StudyTab, {    ...sh,})
      , tab==='todo'     &&React.createElement(TodoTab, {     ...sh,})
      , tab==='timetable'&&React.createElement(TimetableTab, {...sh,})
      , tab==='calendar' &&React.createElement(CalendarTab, { ...sh,})
      , tab==='subjects' &&React.createElement(SubjectsTab, { ...sh,})
      , tab==='materials'&&React.createElement(MaterialsTab, {...sh,})
      , tab==='settings'&&React.createElement(SettingsTab, { ...sh,})

      /* Bottom nav */
      , React.createElement('div', { style: {position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,zIndex:999,paddingBottom:'env(safe-area-inset-bottom)'},}
        , React.createElement('div', { style: {...neu(0,10),borderRadius:'24px 24px 0 0',display:'flex',padding:'8px 0 6px',boxShadow:`0 -6px 20px ${SH1},0 -2px 8px ${SH2}`},}
          , TABS.map(({id,i,l})=>{
            const active=tab===id;
            const hasBadge=(id==='todo'&&badge>0&&!active);
            return(
              React.createElement('button', { key: id, onClick: ()=>setTab(id), style: {flex:1,padding:'6px 0 4px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'},}
                , React.createElement('span', { style: {fontSize:id==='study'?18:19,opacity:active?1:0.5,transition:'all 0.2s'},}, i)
                , React.createElement('span', { style: {fontSize:9,fontWeight:active?800:500,color:active?ACC:MUT,letterSpacing:0.2},}, l)
                , active&&React.createElement('div', { style: {position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:22,height:3,borderRadius:3,background:`linear-gradient(90deg,#8B9BE8,${ACC})`},})
                , hasBadge&&React.createElement('div', { style: {position:'absolute',top:3,right:'12%',width:9,height:9,borderRadius:'50%',background:RED,border:`2px solid ${BG}`},})
              )
            );
          })
        )
      )
    )
  );
}

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
